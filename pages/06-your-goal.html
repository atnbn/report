<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Goal - Clarity Report</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main class="report" aria-label="Your Goal - Clarity Report">
      <!-- ═══════════════════════════════════════
     PAGE 6 — YOUR GOAL
════════════════════════════════════════ -->
      <div class="page">
        <div class="display">Your Goal</div>

        <div class="card goal-card goal-card-fill">
          <div>
            <div class="goal-label">Aktuelles Ziel</div>
            <div class="goal-name">Eigenheim Türkei</div>
            <div class="goal-pct">24 %</div>
            <div class="progress-track"><div class="progress-fill"></div></div>
            <div class="goal-hint">
              Du bist auf dem richtigen Weg – jedes bisschen bringt dich deinem
              Ziel näher.
            </div>
          </div>
          <div class="goal-kpis">
            <div class="goal-kpi">
              <div class="gk-label">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="#888"
                  stroke-width="1.3"
                  stroke-linecap="round"
                >
                  <circle cx="8" cy="8" r="6.5" />
                  <circle cx="8" cy="8" r="3.5" />
                  <circle cx="8" cy="8" r="1" fill="#888" stroke="none" /></svg
                >Zielbetrag
              </div>
              <div class="gk-val">53.000 €</div>
            </div>
            <div class="goal-kpi">
              <div class="gk-label">
                <span class="round-icon gk-icon">↗</span>aktueller Stand
              </div>
              <div class="gk-val">12.800 €</div>
            </div>
            <div class="goal-kpi">
              <div class="gk-label">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="#888"
                  stroke-width="1.3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="3" y1="2" x2="3" y2="14" />
                  <path d="M3 2h9l-2.5 3.5L12.5 9H3" /></svg
                >noch
              </div>
              <div class="gk-val">40.200 €</div>
            </div>
          </div>
        </div>

        <div class="page-footer">
          <div class="logo">
            <svg
              class="logo-icon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle
                cx="12"
                cy="12"
                r="9.5"
                stroke="#111111"
                stroke-width="1.3"
              />
              <path
                d="M15.5 8.5A5 5 0 1 0 15.5 15.5"
                stroke="#111111"
                stroke-width="1.3"
                stroke-linecap="round"
                fill="none"
              /></svg
            >CLARITY
          </div>
          <div class="footer-title"></div>
          <div class="page-num">6 / 10</div>
        </div>
      </div>
    </main>
  </body>
</html>
