<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clarity Report - Clarity Report</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main class="report" aria-label="Clarity Report - Clarity Report">
      <!-- ═══════════════════════════════════════
     PAGE 1 — COVER
════════════════════════════════════════ -->
      <div class="page page-milestones">
        <div class="display display-cover">Clarity Report</div>

        <div class="cover-kpis">
          <div class="card cover-kpi">
            <div class="kpi-title">
              <svg
                width="15"
                height="15"
                viewBox="0 0 16 16"
                fill="none"
                stroke="#888"
                stroke-width="1.3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="1.5" y="2.5" width="13" height="12" rx="1.5" />
                <line x1="5" y1="1" x2="5" y2="4" />
                <line x1="11" y1="1" x2="11" y2="4" />
                <line x1="1.5" y1="6.5" x2="14.5" y2="6.5" />
                <rect
                  x="4"
                  y="9"
                  width="2.5"
                  height="2"
                  rx="0.4"
                  fill="#888"
                  stroke="none"
                />
              </svg>
              Zeitraum
            </div>
            <span class="cover-date">MAI</span>
            <span class="cover-year">2026</span>
          </div>
          <div class="card cover-kpi">
            <div class="kpi-title">
              <svg
                width="15"
                height="15"
                viewBox="0 0 16 16"
                fill="none"
                stroke="#888"
                stroke-width="1.3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 14L6 5l3 4 2-2.5 4 7.5H1z" />
                <circle cx="11.5" cy="4" r="1.3" />
              </svg>
              Freiheits-Schritt
            </div>
            <div class="big-num">+420 €</div>
            <div class="big-num-label">näher an deinem Ziel</div>
          </div>
          <div class="card cover-kpi">
            <div class="kpi-title">
              <svg
                width="15"
                height="15"
                viewBox="0 0 16 16"
                fill="none"
                stroke="#888"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 13L13 3M7 3h6v6" />
              </svg>
              Entwicklung
            </div>
            <div class="big-num">+3,4 %</div>
            <div class="big-num-label">zum Vormonat</div>
          </div>
        </div>

        <div class="page-footer">
          <div class="logo">
            <svg
              class="logo-icon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle
                cx="12"
                cy="12"
                r="9.5"
                stroke="#111111"
                stroke-width="1.3"
              />
              <path
                d="M15.5 8.5A5 5 0 1 0 15.5 15.5"
                stroke="#111111"
                stroke-width="1.3"
                stroke-linecap="round"
                fill="none"
              />
            </svg>
            CLARITY
          </div>
          <div class="footer-title"></div>
          <div class="page-num">1 / 10</div>
        </div>
      </div>
    </main>
  </body>
</html>
