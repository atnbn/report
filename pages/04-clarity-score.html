<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clarity Score - Clarity Report</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main class="report" aria-label="Clarity Score - Clarity Report">
      <!-- ═══════════════════════════════════════
     PAGE 4 — CLARITY SCORE
════════════════════════════════════════ -->
      <div class="page">
        <div class="display">Clarity Score</div>

        <div class="score-layout">
          <div class="card score-circle-card">
            <div class="score-circle">
              <div class="score-num">84</div>
              <div class="score-word">Score</div>
            </div>
          </div>
          <div class="card score-dims">
            <div class="score-dim-row">
              <div class="dim-left">
                <div class="round-icon dim-icon">
                  <svg
                    width="13"
                    height="13"
                    viewBox="0 0 16 16"
                    fill="none"
                    stroke="#888"
                    stroke-width="1.3"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="1.5" y="2.5" width="13" height="12" rx="1.5" />
                    <line x1="5" y1="1" x2="5" y2="4" />
                    <line x1="11" y1="1" x2="11" y2="4" />
                    <line x1="1.5" y1="6.5" x2="14.5" y2="6.5" />
                  </svg>
                </div>
                Budgetkontrolle
              </div>
              <div class="score-val-green">22/25</div>
            </div>
            <div class="score-dim-row">
              <div class="dim-left">
                <div class="round-icon dim-icon">
                  <svg
                    width="13"
                    height="13"
                    viewBox="0 0 16 16"
                    fill="none"
                    stroke="#888"
                    stroke-width="1.3"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <ellipse cx="8" cy="9" rx="5.5" ry="4" />
                    <path d="M3 7c0-2-1-4 1-5" />
                    <path d="M13 7c0-2 1-4-1-5" />
                    <circle cx="6" cy="9" r="0.7" fill="#888" stroke="none" />
                    <circle cx="10" cy="9" r="0.7" fill="#888" stroke="none" />
                  </svg>
                </div>
                Sparquote
              </div>
              <div class="score-val-green">21/25</div>
            </div>
            <div class="score-dim-row">
              <div class="dim-left">
                <div class="round-icon dim-icon">
                  <svg
                    width="13"
                    height="13"
                    viewBox="0 0 16 16"
                    fill="none"
                    stroke="#888"
                    stroke-width="1.3"
                    stroke-linecap="round"
                  >
                    <circle cx="8" cy="8" r="6.5" />
                    <circle cx="8" cy="8" r="3.5" />
                    <circle cx="8" cy="8" r="1" fill="#888" stroke="none" />
                  </svg>
                </div>
                Konsistenz
              </div>
              <div class="score-val-gold">20/25</div>
            </div>
            <div class="score-dim-row">
              <div class="dim-left">
                <div class="round-icon dim-icon">↗</div>
                Effizienz
              </div>
              <div class="score-val-green">21/25</div>
            </div>
            <div class="score-cta">
              <span>◇</span>
              Score teilen
              <span class="cta-arrow">→</span>
            </div>
          </div>
        </div>

        <div class="page-footer">
          <div class="logo">
            <svg
              class="logo-icon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle
                cx="12"
                cy="12"
                r="9.5"
                stroke="#111111"
                stroke-width="1.3"
              />
              <path
                d="M15.5 8.5A5 5 0 1 0 15.5 15.5"
                stroke="#111111"
                stroke-width="1.3"
                stroke-linecap="round"
                fill="none"
              /></svg
            >CLARITY
          </div>
          <div class="footer-title"></div>
          <div class="page-num">4 / 10</div>
        </div>
      </div>
    </main>
  </body>
</html>
