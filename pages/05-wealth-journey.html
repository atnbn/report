<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wealth Journey - Clarity Report</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main class="report" aria-label="Wealth Journey - Clarity Report">
      <!-- ═══════════════════════════════════════
     PAGE 5 — WEALTH JOURNEY
════════════════════════════════════════ -->
      <div class="page">
        <div class="display">Wealth Journey</div>

        <div class="card chart-card">
          <div class="chart-label-row">
            <span class="axis-label">Portfoliowert in €</span>
            <span class="chart-val">12.800 €</span>
          </div>
          <div class="chart-area">
            <svg
              viewBox="0 0 960 160"
              preserveAspectRatio="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <!-- Y grid lines -->
              <line
                x1="0"
                y1="20"
                x2="960"
                y2="20"
                stroke="#E8E8E8"
                stroke-width="0.8"
                stroke-dasharray="4,4"
              />
              <line
                x1="0"
                y1="60"
                x2="960"
                y2="60"
                stroke="#E8E8E8"
                stroke-width="0.8"
                stroke-dasharray="4,4"
              />
              <line
                x1="0"
                y1="100"
                x2="960"
                y2="100"
                stroke="#E8E8E8"
                stroke-width="0.8"
                stroke-dasharray="4,4"
              />
              <line
                x1="0"
                y1="140"
                x2="960"
                y2="140"
                stroke="#E8E8E8"
                stroke-width="0.8"
                stroke-dasharray="4,4"
              />
              <!-- Wealth line: Jan ~108, gradual rise with noise to May 128 -->
              <polyline
                fill="none"
                stroke="#111111"
                stroke-width="1.8"
                stroke-linejoin="round"
                points="
            0,108 20,106 40,110 55,104 70,108 85,106 100,104 115,107 130,103
            145,106 160,108 175,112 190,108 205,104 220,106 235,112 250,116
            265,118 280,124 295,128 310,120 325,122 340,119 355,124 370,128
            385,124 400,118 415,120 430,118 445,114 460,110 475,106 490,108
            505,104 515,100 525,104 535,108 545,106 555,102 565,98 575,95
            590,90 605,85 620,80 635,76 650,72 665,68 680,64 695,60
            710,62 720,58 730,55 740,52 750,48 760,46 770,42 780,38
            790,40 800,36 810,34 820,30 830,28 840,26 850,24 860,22
            870,20 880,18 900,16 920,14 940,12 960,10
          "
              />
              <!-- End dot -->
              <circle cx="960" cy="10" r="5" fill="#2D6A4F" />
            </svg>
          </div>
          <!-- X axis labels -->
          <div class="chart-x-axis">
            <span class="axis-tick">Jan</span>
            <span class="axis-tick">Feb</span>
            <span class="axis-tick">Mär</span>
            <span class="axis-tick">Apr</span>
            <span class="axis-tick">Mai</span>
          </div>
          <div class="chart-caption">
            Ein konsequentes Sparverhalten und gezielte Investments sind der
            Schlüssel für einen nachhaltigen Vermögensaufbau.
          </div>
        </div>

        <div class="journey-kpis">
          <div class="card journey-kpi">
            <div class="round-icon jkpi-icon">▷</div>
            <div>
              <div class="jkpi-label">Start</div>
              <div class="jkpi-val">10.950 €</div>
            </div>
          </div>
          <div class="card journey-kpi">
            <div class="round-icon jkpi-icon">∿</div>
            <div>
              <div class="jkpi-label">Aktuell</div>
              <div class="jkpi-val">12.800 €</div>
            </div>
          </div>
          <div class="card journey-kpi">
            <div class="round-icon jkpi-icon">↗</div>
            <div>
              <div class="jkpi-label">Wachstum</div>
              <div class="jkpi-val green">+1.850 €</div>
            </div>
          </div>
        </div>

        <div class="page-footer">
          <div class="logo">
            <svg
              class="logo-icon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle
                cx="12"
                cy="12"
                r="9.5"
                stroke="#111111"
                stroke-width="1.3"
              />
              <path
                d="M15.5 8.5A5 5 0 1 0 15.5 15.5"
                stroke="#111111"
                stroke-width="1.3"
                stroke-linecap="round"
                fill="none"
              /></svg
            >CLARITY
          </div>
          <div class="footer-title"></div>
          <div class="page-num">5 / 10</div>
        </div>
      </div>
    </main>
  </body>
</html>
